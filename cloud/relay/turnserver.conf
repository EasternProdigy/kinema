# ============================================================================
# Kadmu Cloud — coturn relay (the capped TURN fallback for Phase 5 / P2P remote)
# ----------------------------------------------------------------------------
# This is a RUNBOOK as much as a config. Read it top-to-bottom before editing.
#
# WHAT THIS IS
#   coturn is the last-resort relay for the ~10-20% of hostile-NAT networks where
#   the Phase 4b P2P (WebRTC) path can't make a direct connection. P2P stays the
#   default; this relay only carries a session when ICE has no other candidate.
#   See docs/PHASE_5_DESIGN.md §2 and cloud/relay/README.md.
#
# HOW IT'S GATED (no open relay, ever)
#   We use coturn's TURN REST API ephemeral-credential scheme (use-auth-secret).
#   The Kadmu control-plane (4a, GET /api/relay-credentials) mints short-lived
#   credentials and coturn validates them LOCALLY with the shared secret — no
#   per-call lookup back to us, so the relay stays dumb and cheap.
#
#     username = "<expiry-unix-timestamp>:<tenant-id>"
#     password = base64( HMAC-SHA1( static-auth-secret, username ) )
#
#   coturn recomputes that HMAC with `static-auth-secret`; if it matches and the
#   embedded timestamp is in the future, the allocation is allowed. Over budget
#   or no subscription => the control-plane never mints a credential => no relay.
#
# IMPORTANT — SECRETS ARE NOT IN THIS FILE. coturn does NOT expand $(VAR)/${VAR}
#   inside a config file, so the secret, realm, and external IP are injected at
#   launch as coturn CLI flags (which DO get expanded from .env) — see
#   docker-compose.yml:
#       turnserver -c turnserver.conf --static-auth-secret="$TURN_SECRET" \
#                  --realm="$TURN_REALM" --server-name="$TURN_REALM" \
#                  [--external-ip="$TURN_EXTERNAL_IP"]
#   CLI flags override/extend this file, keeping the committed config secret-free.
#   (Running coturn WITHOUT compose? Pass those flags yourself, or uncomment and
#   fill the lines below by hand — but NEVER commit a real secret.)
# ============================================================================


# --- Authentication: TURN REST API ephemeral credentials --------------------
# Turn on the time-limited shared-secret scheme. With this set, coturn does NOT
# consult a userdb — it validates the HMAC of each ephemeral username locally.
use-auth-secret

# The shared HMAC-SHA1 secret + realm + server-name are injected at launch as
# coturn CLI flags from .env (see the file header + docker-compose.yml), so this
# committed config stays secret-free. Uncomment + fill ONLY for a manual run —
# never commit a real secret:
#   static-auth-secret=CHANGE_ME_run_openssl_rand_hex_32

# realm + server-name are likewise injected via CLI (--realm / --server-name).
# Uncomment ONLY for a manual, non-compose run:
#   realm=turn.kadmu.app
#   server-name=turn.kadmu.app


# --- Networking -------------------------------------------------------------
# Standard STUN/TURN ports. 3478 = plain (UDP+TCP); 5349 = TLS/DTLS.
listening-port=3478
tls-listening-port=5349

# Relay (media) UDP port range. coturn allocates one relay port per session from
# this window, so the range caps concurrent relayed sessions. 49160-49200 (~40
# ports) is sized for a small box — TUNABLE: widen it (and the firewall + the
# RELAY_MIN/MAX_PORT vars in .env / docker-compose) if you need more concurrency.
min-port=49160
max-port=49200

# Public IP of this VPS, for the SDP/relay candidates coturn hands out. REQUIRED
# on a NAT'd VPS so clients are told the routable address, not the private one.
# Injected at launch via --external-ip="$TURN_EXTERNAL_IP" (only when set; see
# docker-compose.yml). For a 1:1 NAT you can also use <public>/<private>.
# Uncomment ONLY for a manual run on a NAT'd box:
#   external-ip=203.0.113.10


# --- Quality / abuse caps (the cost-model ceiling — Phase 5 §2.4) -----------
# Relay carries VIDEO when used, and video is the only place egress can leak, so
# every relayed session is clamped to roughly 720p / ~2.5 Mbps. These are the
# coturn-side backstops; the connector ALSO clamps quality when its selected ICE
# pair is `relay` (RELAY_MAX_HEIGHT=720). Defense in depth.

# Per-session bitrate ceiling, in BITS per second. ~3 Mbps leaves headroom over
# the 2.5 Mbps 720p target for audio + overhead. coturn drops above this.
max-bps=3000000

# Total relayed bandwidth across the WHOLE server, in bits/sec (0 = unlimited).
# Sized to the small-box budget so one busy tenant can't saturate the NIC for
# everyone. TUNABLE to your VPS uplink. Here: ~60 Mbps aggregate ceiling.
bps-capacity=60000000

# Max simultaneous allocations across the whole server. A coarse fleet cap that
# pairs with the relay port range above. TUNABLE.
total-quota=100

# Max simultaneous allocations per username (i.e. per ephemeral credential, which
# is per tenant+expiry). Keeps a single tenant from hogging the box. TUNABLE.
user-quota=12


# --- Security: NEVER an SSRF / abuse proxy into private networks -------------
# CRITICAL. A TURN relay forwards UDP/TCP to whatever peer the client names. If
# we don't deny private/loopback/link-local ranges, a malicious client could use
# our relay to reach internal services (cloud metadata endpoints, the LAN behind
# the VPS, localhost) — classic SSRF. Deny ALL non-public ranges, v4 and v6.

# No multicast peers — relays must never fan traffic to multicast groups.
no-multicast-peers

# IPv4 — RFC1918 private, loopback, link-local, CGNAT (RFC6598), TEST-NET, etc.
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.168.0.0-192.168.255.255

# IPv6 — loopback (::1), Unique Local Addresses (fc00::/7), and link-local
# (fe80::/10). These block the v6 equivalents of the v4 ranges above.
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# Refuse UDP relay endpoints that aren't STUN/TURN-shaped (anti-port-scan abuse).
secure-stun

# TLS hardening. Disable the ancient, broken TLS versions on :5349.
no-tlsv1
no-tlsv1_1

# Always add the FINGERPRINT attribute (interop + integrity on STUN messages).
fingerprint

# Reject stale nonces — forces clients to use fresh nonces, limiting replay.
stale-nonce

# Disable the telnet/CLI admin interface entirely. (Alternatively set a
# cli-password=... — but on a single-purpose relay, off is safest.)
no-cli

# no-rfc5780 is OPTIONAL — it disables NAT-behaviour discovery (the extra STUN
# attributes RFC 5780 adds). It slightly reduces info disclosure but is not
# required; left commented so standard NAT discovery works for clients.
# no-rfc5780


# --- Observability: Prometheus exporter (Phase 5 §2.3 / §8) -----------------
# Exposes coturn metrics (incl. per-allocation `turn_traffic_*` byte counters) on
# :9641/metrics. The cloud/metering/ collector scrapes this, diffs the byte
# counters, and attributes them to the tenant encoded in the TURN username — that
# is how per-tenant relay usage (and the per-plan caps) are enforced. Keep :9641
# on the internal network only (see docker-compose.yml); do not expose it public.
prometheus


# --- Logging (containers: log to stdout) ------------------------------------
# `-` sends the log to stdout so `docker logs` / the platform's log pipeline pick
# it up — no log files to rotate inside the container.
log-file=stdout
# Don't write a redundant simple log alongside the verbose one.
no-stdout-log=false
# Keep logs lean in production; uncomment `verbose` only when debugging a session.
# verbose

# Drop privileges after binding the low ports (defense in depth inside the image).
# proc-user=nobody
# proc-group=nogroup
