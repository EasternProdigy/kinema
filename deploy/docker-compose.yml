# Public demo deployment. Put it behind a reverse proxy that terminates HTTPS.
# Run from the project root:
#   docker compose -f deploy/docker-compose.yml up --build
services:
  kinema-demo:
    build:
      context: ..                    # build context = project root
      dockerfile: deploy/Dockerfile
    image: kinema-demo
    ports:
      - "8000:8000"
    environment:
      - KINEMA_READONLY=1
      # Lock to your demo domain instead of allow-any-host (edit Dockerfile CMD too):
      # - KINEMA_ALLOWED_HOSTS=kinema-demo.example.com
    restart: unless-stopped

  # Example: run YOUR OWN library over the LAN (not the demo).
