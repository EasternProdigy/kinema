name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile-check the server
        run: python -m py_compile server.py
      - name: Syntax-check the frontend
        run: node --check web/app.js
      - name: Boot smoke test
        run: |
          python server.py --no-open --port 8011 &
          PID=$!
          for i in $(seq 1 30); do
            curl -sf "http://127.0.0.1:8011/api/session" >/dev/null && break
            sleep 0.2
          done
          curl -sf "http://127.0.0.1:8011/api/session" | grep -q '"app": "Kinema"'
          kill "$PID"
